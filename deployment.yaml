apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment4
  labels:
    app: nginx4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx4
  template:
    metadata:
      labels:
        app: nginx4
    spec:
      containers:
      - name: nginx4
        image: bpramodml/fastapiv6:latest
        ports:
        - containerPort: 8000